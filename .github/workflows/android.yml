name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-write: ${{ github.event_name != 'pull_request' }}

      - name: Decode Keystore (if secrets available)
        if: env.SIGNING_KEY != ''
        env:
          ENCODED_STRING: ${{ secrets.SIGNING_KEY }}
        run: |
          echo $ENCODED_STRING | base64 -di > app/keystore.jks
          ls -l app/keystore.jks
        continue-on-error: true

      - name: Clean Gradle
        run: ./gradlew clean --info

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --info --warning-mode all

      - name: Build Release APK (Unsigned)
        run: |
          ./gradlew assembleRelease -x lint --stacktrace --info --warning-mode all \
            -PRELEASE_STORE_FILE=keystore.jks \
            -PRELEASE_STORE_PASSWORD="" \
            -PRELEASE_KEY_ALIAS="" \
            -PRELEASE_KEY_PASSWORD=""
        continue-on-error: true
        id: release_build

      - name: Build Release APK (Fallback - Debug Signed)
        if: steps.release_build.outcome == 'failure'
        run: |
          echo "Release signing failed (no keystore), building unsigned debug APK instead"
          ./gradlew assembleDebug --stacktrace --info

      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: KeyMod-debug
          path: |
            app/build/outputs/apk/debug/*.apk
          retention-days: 90

      - name: Upload Release APK (if signed)
        if: steps.release_build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: KeyMod-signed-release
          path: |
            app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload Build Failure Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/build/reports/
            **/*.log
          retention-days: 7