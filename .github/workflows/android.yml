name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-write: ${{ github.event_name != 'pull_request' }}

      - name: Prepare signing keystore
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks
          ls -la app/keystore.jks
          file app/keystore.jks
          # Verify keystore can be read
          keytool -list -v -keystore app/keystore.jks -storepass "${{ secrets.KEY_STORE_PASSWORD }}" -keypass "${{ secrets.KEY_PASSWORD }}" || echo "KEYSTORE VERIFICATION FAILED"
          echo "RELEASE_STORE_FILE=keystore.jks" >> gradle.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.KEY_STORE_PASSWORD }}" >> gradle.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.ALIAS }}" >> gradle.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> gradle.properties
          # Show what gradle.properties contains (mask sensitive parts)
          echo "gradle.properties contents:"
          cat gradle.properties

      - name: Clean Gradle
        run: ./gradlew clean --info

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace --info --warning-mode all

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: KeyMod-release
          path: |
            app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload Build Failure Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/build/reports/
            **/*.log
          retention-days: 7