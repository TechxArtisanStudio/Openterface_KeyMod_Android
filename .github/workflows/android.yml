name: Build APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'
          cache-read-only: ${{ github.event_name == 'pull_request' }}
          cache-write: ${{ github.event_name != 'pull_request' }}

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.SIGNING_KEY }}
        run: |
          echo $ENCODED_STRING | base64 -di > app/keystore.jks
          ls -l app/keystore.jks

      - name: Clean Gradle
        run: ./gradlew clean --info

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace --info --warning-mode all

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease -x lint --stacktrace --info --warning-mode all \
            -PRELEASE_STORE_FILE=keystore.jks \
            -PRELEASE_STORE_PASSWORD="${{ secrets.KEY_STORE_PASSWORD }}" \
            -PRELEASE_KEY_ALIAS="${{ secrets.SIGNING_KEY }}" \
            -PRELEASE_KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

      - name: Upload Signed Release APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: KeyMod-signed-release
          path: |
            app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Upload Build Failure Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            **/build/reports/
            **/*.log
          retention-days: 7